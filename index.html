<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CBT Matsahad 62</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#166534">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#166534;
overflow:hidden;
}

/* SPLASH */

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#166534;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.splash-content{
text-align:center;
color:white;
}

.logo{
width:120px;
background:white;
padding:15px;
border-radius:30px;
margin-bottom:20px;
animation:pulse 2s infinite;
}

.loading{
width:220px;
height:8px;
background:rgba(255,255,255,0.2);
border-radius:20px;
overflow:hidden;
margin-top:20px;
}

.bar{
height:100%;
width:0%;
background:white;
animation:load 3s linear forwards;
}

/* LOGIN */

#loginPage{
display:none;
background:#f3f7f4;
height:100vh;
justify-content:center;
align-items:center;
padding:20px;
}

.login-box{
background:white;
padding:35px;
border-radius:25px;
width:100%;
max-width:400px;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
text-align:center;
}

.login-logo{
width:90px;
margin-bottom:20px;
}

h1{
color:#166534;
margin-bottom:10px;
}

p{
color:#6b7280;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #d1d5db;
border-radius:14px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
background:#166534;
color:white;
font-size:17px;
font-weight:bold;
border-radius:14px;
cursor:pointer;
}

@keyframes load{
100%{
width:100%;
}
}

@keyframes pulse{
0%{
transform:scale(1);
}
50%{
transform:scale(1.05);
}
100%{
transform:scale(1);
}
}

</style>

</head>

<body>

<!-- SPLASH -->

<div id="splash">

<div class="splash-content">

<img src="logo.png" class="logo">

<h1>CBT Matsahad 62</h1>

<p>Sistem Ujian Berbasis Komputer</p>

<div class="loading">

<div class="bar"></div>

</div>

</div>

</div>

<!-- LOGIN -->

<div id="loginPage">

<div class="login-box">

<img src="logo.png" class="login-logo">

<h1>Login CBT</h1>

<p>Masuk menggunakan akun siswa</p>

<input type="text" id="user"
placeholder="Username">

<input type="password" id="pass"
placeholder="Password">

<button onclick="login()">
Masuk
</button>

</div>

</div>

<script>

// tampilkan login setelah splash
setTimeout(function(){

document.getElementById("splash").style.display = "none";

document.getElementById("loginPage").style.display = "flex";

document.body.style.background = "#f3f7f4";

},3000);

// login
function login(){

let user =
document.getElementById('user').value;

let pass =
document.getElementById('pass').value;

if(user=="siswa" && pass=="12345"){

localStorage.setItem("namaSiswa",user);

window.location.href='dashboard.html';

}else{

alert("Username atau Password salah");

}

}

// PWA
if ('serviceWorker' in navigator) {

navigator.serviceWorker.register('service-worker.js');

}

</script>

</body>
</html>
