<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login CBT Matsahad 62</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f7f4;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.login-box{
background:white;
padding:30px 22px;
border-radius:25px;
width:100%;
max-width:400px;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
text-align:center;
}

.logo{
width:90px;
margin-bottom:20px;
}

h1{
color:#166534;
margin-bottom:10px;
font-size:28px;
}

p{
color:#6b7280;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #d1d5db;
border-radius:14px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
background:#166534;
color:white;
font-size:17px;
font-weight:bold;
border-radius:14px;
cursor:pointer;
}

button:hover{
background:#14532d;
}

.info{
margin-top:20px;
font-size:14px;
color:#6b7280;
}

</style>

</head>

<body>

<div class="login-box">

<img src="logo.png" class="logo">

<h1>CBT Matsahad 62</h1>

<p>Login menggunakan akun siswa</p>

<input type="text" id="user"
placeholder="Username">

<input type="password" id="pass"
placeholder="Password">

<button onclick="login()">
Masuk
</button>

<div class="info">
MTs Matsahad 62
</div>

</div>

<script>

function login(){

let user =
document.getElementById('user').value;

let pass =
document.getElementById('pass').value;

if(user=="siswa" && pass=="12345"){

localStorage.setItem("namaSiswa",user);

window.location.href='dashboard.html';

}else{

alert("Username atau Password salah");

}

}

</script>

</body>
</html>
