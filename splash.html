<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#166534;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.splash{
text-align:center;
color:white;
animation:fade 1.5s ease;
}

.logo{
width:120px;
height:120px;
border-radius:30px;
background:white;
padding:15px;
margin-bottom:20px;
animation:pulse 2s infinite;
}

h1{
font-size:28px;
margin-bottom:10px;
}

p{
opacity:0.9;
font-size:16px;
}

.loading{
margin-top:25px;
width:220px;
height:8px;
background:rgba(255,255,255,0.2);
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:white;
animation:load 3s linear forwards;
}

@keyframes load{
100%{
width:100%;
}
}

@keyframes pulse{
0%{
transform:scale(1);
}
50%{
transform:scale(1.05);
}
100%{
transform:scale(1);
}
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="splash">

<img src="logo.png" class="logo">

<h1>CBT Matsahad 62</h1>

<p>Sistem Ujian Berbasis Komputer</p>

<div class="loading">

<div class="bar"></div>

</div>

</div>

<script>

setTimeout(()=>{

window.location.href='index.html';

},3000);

</script>

</body>
</html>
